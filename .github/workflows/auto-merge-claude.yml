name: Auto-merge claude/ branches to staging

# SSi Learning App branch policy (see CLAUDE.md):
#   - All work goes to staging first
#   - staging → main merge is manual after ~1 week of testing
# So claude/* branches from Claude Code web auto-merge to STAGING, not main.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  merge-to-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge to staging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Refresh in case staging moved since checkout
          git fetch origin staging

          # Skip if branch is already an ancestor of staging
          if git merge-base --is-ancestor origin/${{ github.ref_name }} origin/staging; then
            echo "Branch already merged into staging — nothing to do"
            exit 0
          fi

          git checkout staging
          git merge origin/${{ github.ref_name }} --no-edit
          git push origin staging
